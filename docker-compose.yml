services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vsm-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - vsm-network
    # Hot-reload in development: mount source and override the CMD
    # volumes:
    #   - ./backend:/app
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vsm-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - vsm-network

networks:
  vsm-network:
    driver: bridge
